<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сохранение в PNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: #fff; }
        #status { margin: 10px 0; }
        iframe { width: 100%; height: 80vh; border: 1px solid #333; background: #fff; }
    </style>
</head>
<body>
    <h3>Сохранение вёрстки как PNG</h3>
    <p id="status">Загрузка…</p>
    <iframe id="frame" style="display:none;"></iframe>

    <script>
        const params = new URLSearchParams(location.search);
        const url = params.get('url');
        const filename = params.get('filename') || (url ? url.replace(/\.(html?)?$/i, '') + '.png' : 'screenshot.png');

        if (!url) {
            document.getElementById('status').textContent = 'Ошибка: не указан url';
        } else {
            const frame = document.getElementById('frame');
            frame.src = url;
            frame.style.display = 'block';
            frame.onload = function() {
                document.getElementById('status').textContent = 'Создание изображения…';
                const doc = frame.contentDocument;
                if (!doc || !doc.body) {
                    document.getElementById('status').textContent = 'Ошибка: нет доступа к содержимому. Используйте локальный сервер (http://127.0.0.1:8080/).';
                    return;
                }
                html2canvas(doc.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: 1.5,
                    logging: false,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    canvas.toBlob(blob => {
                        const a = document.createElement('a');
                        a.download = filename;
                        a.href = URL.createObjectURL(blob);
                        a.click();
                        URL.revokeObjectURL(a.href);
                        document.getElementById('status').textContent = 'Готово! Файл скачан. Можно закрыть вкладку.';
                    }, 'image/png');
                }).catch(err => {
                    document.getElementById('status').textContent = 'Ошибка: ' + (err.message || 'не удалось создать изображение');
                });
            };
        }
    </script>
</body>
</html>
